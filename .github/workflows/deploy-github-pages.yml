# Builds the Vite app and publishes dist/ to the gh-pages branch.
# Project site URL: https://<org>.github.io/<repo>/
#
# One-time repo setup (Settings → Pages):
#   Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages   Folder: / (root)
#
# Secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#
# If the repo is <user>.github.io (site at https://<user>.github.io/), set:
#   VITE_BASE_PATH: /

name: Deploy GitHub Pages (disabled)

on:
  workflow_dispatch:
    inputs:
      disabled:
        description: 'This workflow is disabled — using Firebase instead'
        required: false

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        env:
          GITHUB_SHA: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: SPA fallback (refresh on deep links)
        run: cp dist/index.html dist/404.html

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
